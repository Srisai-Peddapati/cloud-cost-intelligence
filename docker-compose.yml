version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    depends_on:
      - db
    networks:
      - cost-intelligence-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8080/api
    depends_on:
      - backend
    networks:
      - cost-intelligence-network

  db:
    image: h2:latest
    ports:
      - "8081:8081"
    networks:
      - cost-intelligence-network

networks:
  cost-intelligence-network:
    driver: bridge

